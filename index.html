       <!DOCTYPE html>
<html>
<head>
  <title>Ravin id Buy & Sell</title>
  <style>
    body {
      font-family: Arial;
      background: #f1f3f6;
      margin: 0;
      padding: 0;
    }

    header {
      background: #2874f0;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      padding: 20px;
    }

    .form-box, .product-box {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    button {
      cursor: pointer;
      border: none;
      background: #2874f0;
      color: white;
      border-radius: 5px;
    }

    .cart {
      margin-top: 20px;
      background: white;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>Mini Flipkart Clone</header>

<div class="container">

  <!-- Add Product -->
  <div class="form-box">
    <h3>Add Product</h3>
    <input type="text" id="name" placeholder="Product Name">
    <input type="number" id="price" placeholder="Price">
    <button onclick="addProduct()">Add</button>
  </div>

  <!-- Products -->
  <div class="product-box">
    <h3>Products</h3>
    <div class="products" id="productList"></div>
  </div>

  <!-- Cart -->
  <div class="cart">
    <h3>Cart</h3>
    <ul id="cartList"></ul>
    <p>Total: ₹<span id="total">0</span></p>
    <button onclick="payUPI()">Pay with UPI</button>
  </div>

</div>

<script>
let products = [];
let cart = [];
let total = 0;

function addProduct() {
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;

  if (!name || !price) {
    alert("Enter product details");
    return;
  }

  let product = { name, price: parseFloat(price) };
  products.push(product);
  displayProducts();
}

function displayProducts() {
  let list = document.getElementById("productList");
  list.innerHTML = "";

  products.forEach((p, index) => {
    list.innerHTML += `
      <div class="card">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${index})">Buy</button>
      </div>
    `;
  });
}

function addToCart(index) {
  let item = products[index];
  cart.push(item);
  total += item.price;

  displayCart();
}

function displayCart() {
  let cartList = document.getElementById("cartList");
  cartList.innerHTML = "";

  cart.forEach(item => {
    cartList.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
  });

  document.getElementById("total").innerText = total;
}

function payUPI() {
  if (total === 0) {
    alert("Cart is empty");
    return;
  }

  let upiUrl = `upi://pay?pa=ravinrobert31@okicici&pn=Shop&am=${total}&cu=INR`;
  window.location.href = upiUrl;
}
</script>

</body>
</html>
