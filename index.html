<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravin Gaming</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: #020617;
}

header h1 {
  font-size: 18px;
}

nav a {
  margin-left: 10px;
  color: white;
  text-decoration: none;
  font-size: 14px;
}

.container {
  padding: 15px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.price {
  margin: 8px 0;
}

button {
  padding: 8px 12px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

/* Floating buttons */
.floating {
  position: fixed;
  bottom: 15px;
  right: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.float-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.whatsapp {
  background: #25D366;
}

.instagram {
  background: radial-gradient(circle, #feda75, #d62976, #962fbf);
}

.float-btn img {
  width: 25px;
}
</style>
</head>

<body>

<header>
  <h1>Ravin Gaming</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Login</a>
    <a href="#">Contact</a>
  </nav>
</header>

<div class="container">
  <h2>🔥 Free Fire Accounts</h2>

  <div class="products">

    <div class="card">
      <img src="ff1.jpg">
      <h3>ID 1</h3>
      <p>Rare Skins</p>
      <div class="price">₹999</div>
      <button onclick="buy()">Buy Now</button>
    </div>

    <div class="card">
      <img src="ff2.jpg">
      <h3>ID 2</h3>
      <p>Legendary Guns</p>
      <div class="price">₹7999</div>
      <button onclick="buy()">Buy Now</button>
    </div>

    <div class="card">
      <img src="ff3.jpg">
      <h3>ID 3</h3>
      <p>Emotes Bundle</p>
      <div class="price">₹6999</div>
      <button onclick="buy()">Buy Now</button>
    </div>

    <div class="card">
      <img src="ff4.jpg">
      <h3>ID 4</h3>
      <p>Budget Account</p>
      <div class="price">₹4999</div>
      <button onclick="buy()">Buy Now</button>
    </div>

  </div>
</div>

<!-- Floating Contact -->
<div class="floating">

  <a href="https://wa.me/919042458779" target="_blank" class="float-btn whatsapp">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
  </a>

  <a href="https://instagram.com/rx_traffic_razer_46" target="_blank" class="float-btn instagram">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
  </a>

</div>

<script>
function buy() {
  window.location.href = "https://wa.me/919042458779";
}
</script>

</body>
</html>
