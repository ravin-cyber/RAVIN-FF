<!DOCTYPE html>
<html>
<head>
  <title>Buy & Sell Store</title>

  <!-- Important for mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      color: #00f7ff;
    }

    .container {
      padding: 15px;
    }

    /* MOBILE SINGLE COLUMN */
    .products {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    button {
      padding: 12px;
      width: 100%;
      background: #00f7ff;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      margin-top: 10px;
    }

    /* WhatsApp Button */
    .whatsapp-btn {
      position: fixed;
      bottom: 15px;
      right: 15px;
      background: #25D366;
      color: white;
      padding: 12px 16px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 14px;
    }

  </style>
</head>

<body>

<header>🛒 Ravin Buy & Sell Store</header>

<div class="container">

  <h2>Products</h2>

  <div class="products">

    <div class="card">

      <button onclick="buy()">Buy Now</button>
    </div>

    <div class="card">
      <h3>Product 2</h3>

    <div class="card">

  </div>

</div>

<!-- WhatsApp Button -->
<a class="whatsapp-btn"

   💬 Contact on WhatsApp

</html>
