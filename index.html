<!DOCTYPE html>
<html>
<head>
  <title>Game Store</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 20px;
      text-align: center;
      font-size: 26px;
      color: #00f7ff;
      box-shadow: 0 0 10px #00f7ff;
    }

    .container {
      padding: 20px;
    }

    .box {
      background: #111827;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0,255,255,0.2);
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    input {
      background: #1f2937;
      color: white;
    }

    button {
      background: #00f7ff;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,255,255,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00f7ff;
    }

    .cart {
      background: #111827;
      padding: 15px;
      border-radius: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

  </style>
</head>

<body>

<header>🎮 Game Store</header>

<div class="container">

  <!-- Add Product -->
  <div class="box">
    <h3>Add Game</h3>
    <input type="text" id="name" placeholder="Game Name">
    <input type="number" id="price" placeholder="Price">
    <button onclick="addProduct()">Add Game</button>
  </div>

  <!-- Products -->
  <div class="box">
    <h3>Games</h3>
    <div class="products" id="productList"></div>
  </div>

  <!-- Cart -->
  <div class="cart">
    <h3>Cart</h3>
    <ul id="cartList"></ul>
    <p>Total: ₹<span id="total">0</span></p>
    <button onclick="payUPI()">Pay with UPI</button>
  </div>

</div>

<script>
let products = [];
let cart = [];
let total = 0;

function addProduct() {
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;

  if (!name || !price) {
    alert("Enter game details");
    return;
  }

  products.push({ name, price: parseFloat(price) });
  displayProducts();
}

function displayProducts() {
  let list = document.getElementById("productList");
  list.innerHTML = "";

  products.forEach((p, index) => {
    list.innerHTML += `
      <div class="card">
        <h4>🎮 ${p.name}</h4>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${index})">Buy</button>
      </div>
    `;
  });
}

function addToCart(index) {
  let item = products[index];
  cart.push(item);
  total += item.price;
  displayCart();
}

function displayCart() {
  let cartList = document.getElementById("cartList");
  cartList.innerHTML = "";

  cart.forEach(item => {
    cartList.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
  });

  document.getElementById("total").innerText = total;
}

function payUPI() {
  if (total === 0) {
    alert("Cart is empty");
    return;
  }

  let upiUrl = `upi://pay?pa=ravinrobert31@okicici&pn=GameStore&am=${total}&cu=INR`;
  window.location.href = upiUrl;
}
</script>

</body>
</html>
