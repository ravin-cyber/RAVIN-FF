<!DOCTYPE html>
<html>
<head>
  <title>Buy & Sell Store</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      color: #00f7ff;
    }

    .container {
      padding: 20px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    button {
      padding: 10px;
      background: #00f7ff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    /* WhatsApp Floating Button */
    .whatsapp-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px 20px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

  </style>
</head>

<body>

<header>🛒 Buy & Sell Store</header>

<div class="container">

  <h2>Products</h2>

  <div class="products">

    <div class="card">
      <h3>Product 1</h3>
      <p>Price: ₹699</p>
      <button onclick="buy()">Buy Now</button>
    </div>

    <div class="card">
      <h3>Product 2</h3>
      <p>Price: ₹699</p>
      <button onclick="buy()">Buy Now</button>
    </div>

    <div class="card">
      <h3>Product 3</h3>
      <p>Price: ₹699</p>
      <button onclick="buy()">Buy Now</button>
    </div>

  </div>

</div>

<!-- WhatsApp Button -->
<a class="whatsapp-btn"
   href="https://wa.me/919042458779"
   target="_blank">
   💬 Contact on WhatsApp
</a>

<script>
function buy() {
  let upiUrl = "upi://pay?pa=ravinrobert31@okicici&pn=Store&am=699&cu=INR";
  window.location.href = upiUrl;
}
</script>

</body>
</html>
