<!DOCTYPE html>
<html>
<head>
<title>RAVIN-FF NEW</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {margin:0; font-family:Arial; background:#0b0f19; color:white;}
header {background:#020617; padding:20px; text-align:center;}
input {padding:10px; margin:5px;}
button {padding:10px; margin:5px;}
.products {display:flex; flex-wrap:wrap;}
.card {background:#1e293b; margin:10px; padding:10px; border-radius:10px;}
</style>
</head>

<body>

<header>
<h1>RAVIN-FF STORE</h1>
</header>

<h2 style="text-align:center;">Admin Panel</h2>

<div style="text-align:center;">
<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<button onclick="addProduct()">Add Product</button>
</div>

<h2 style="text-align:center;">Products</h2>
<div class="products" id="productList"></div>

<script>
let products = [];
let cart = [];

function showProducts(){
    let html = "";
    products.forEach((p,i)=>{
        html += `<div class='card'>
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${i})">Add to Cart</button><br><br>
        <button onclick="editProduct(${i})">Edit</button>
        <button onclick="deleteProduct(${i})">Delete</button>
        </div>`;
    });
    document.getElementById("productList").innerHTML = html;
}

function addProduct(){
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;

    if(name && price){
        products.push({name,price});
        showProducts();
        alert("Product Added ✅");
    } else {
        alert("Enter details");
    }
}

function editProduct(i){
    let newName = prompt("Edit name:", products[i].name);
    let newPrice = prompt("Edit price:", products[i].price);

    if(newName && newPrice){
        products[i] = {name:newName, price:newPrice};
        showProducts();
    }
}

function deleteProduct(i){
    if(confirm("Delete product?")){
        products.splice(i,1);
        showProducts();
    }
}

function addToCart(i){
    cart.push(products[i]);
    document.getElementById("cartCount").innerText = cart.length;
}

function payNow(){
    window.location.href = "upi://pay?pa=yourupi@upi&pn=RAVIN&cu=INR";
}

showProducts();
</script>

</body>
</html>
