<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      background: #fafafa;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 300px;
      background: white;
      border: 1px solid #ddd;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
    }

    .logo {
      width: 120px;
      margin-bottom: 10px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      background: #0095f6;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .links {
      margin-top: 10px;
      font-size: 12px;
    }

    .social button {
      background: #eee;
      color: black;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<div class="box">

  <!-- Garena FF Logo -->
  <img src="https://upload.wikimedia.org/wikipedia/en/7/7b/Garena_Free_Fire_Logo.png" class="logo">

  <h3>Login</h3>

  <input type="text" placeholder="Username / Email">
  <input type="password" placeholder="Password">

  <button>Login</button>

  <div class="social">
    <button>Login with Google</button>
    <button>Login with Facebook</button>
  </div>

  <div class="links">
    <p><a href="#">Forgot Password?</a></p>
    <p><a href="#">Create New Account</a></p>
  </div>

</div>

</body>
</html>
