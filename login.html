<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gaming Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      color: white;
    }

    /* GRID LAYOUT */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
    }

    /* LEFT SIDE */
    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #1a1a2e, #0f0f1a);
    }

    /* RIGHT SIDE */
    .right {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* LOGIN BOX */
    .login-box {
      background: #1f1f2e;
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      box-shadow: 0 0 20px #00ffcc;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      background: #2a2a40;
      color: white;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(90deg, #00ffcc, #ff00ff);
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    .links {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .links a {
      color: #00ffcc;
      text-decoration: none;
      font-size: 14px;
    }

    .social {
      margin-top: 15px;
    }

    .social button {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .google {
      background: #db4437;
      color: white;
    }

    .facebook {
      background: #4267B2;
      color: white;
    }

    /* MOBILE RESPONSIVE */
    @media (max-width: 768px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

</head>
<body>

<div class="main-grid">

  <div class="left">
    <h1>🎮 Game Zone</h1>
    <p>Welcome to the gaming portal</p>
  </div>

  <div class="right">
    <div class="login-box">
      <h2>Login</h2>

      <input type="text" placeholder="Username">
      <input type="password" placeholder="Password">

      <button>Login</button>

      <div class="links">
        <a href="#">Register</a>
        <a href="#">Forgot Password?</a>
      </div>

      <div class="social">
        <button class="google">Login with Google</button>
        <button class="facebook">Login with Facebook</button>
      </div>
    </div>
  </div>

</div>

</body>
</html>
