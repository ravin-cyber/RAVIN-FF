<!DOCTYPE html>
<html>
<head>
  <title>Login - Ravin Gaming</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    a {
      color: #38bdf8;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2 id="title">Login</h2>

  <input type="text" id="username" placeholder="Username"><br>
  <input type="password" id="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>

  <p>
    <a onclick="showRegister()">Register</a> |
    <a onclick="forgotPassword()">Forgot Password</a>
  </p>
</div>

<script>
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  let savedUser = localStorage.getItem("user");
  let savedPass = localStorage.getItem("pass");

  if(user === savedUser && pass === savedPass) {
    alert("Login Successful!");
    window.location.href = "index.html";
  } else {
    alert("Wrong Username or Password!");
  }
}

function showRegister() {
  document.getElementById("title").innerText = "Register";
  document.querySelector("button").innerText = "Register";
  document.querySelector("button").onclick = register;
}

function register() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  localStorage.setItem("user", user);
  localStorage.setItem("pass", pass);

  alert("Registered Successfully!");
  location.reload();
}

function forgotPassword() {
  let user = prompt("Enter your username:");
  if(user === localStorage.getItem("user")) {
    alert("Your password is: " + localStorage.getItem("pass"));
  } else {
    alert("User not found!");
  }
}
</script>

</body>
</html>
